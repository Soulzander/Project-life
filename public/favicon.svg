<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0b0b0b" />
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6a00" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Outer radar rings -->
    <circle cx="256" cy="256" r="180" fill="none" stroke="url(#neon)" stroke-width="12" stroke-dasharray="20 40" opacity="0.6"/>
    <circle cx="256" cy="256" r="120" fill="none" stroke="url(#neon)" stroke-width="16" stroke-dasharray="80 20" opacity="0.8"/>
    
    <!-- Center target -->
    <path d="M 256 196 L 256 316 M 196 256 L 316 256" stroke="url(#neon)" stroke-width="16" stroke-linecap="round"/>
    <circle cx="256" cy="256" r="32" fill="none" stroke="url(#neon)" stroke-width="12" />
    <circle cx="256" cy="256" r="12" fill="#ff6a00" />
    
    <!-- Crosshairs -->
    <line x1="256" y1="36" x2="256" y2="76" stroke="#a855f7" stroke-width="12" stroke-linecap="round"/>
    <line x1="256" y1="436" x2="256" y2="476" stroke="#ff6a00" stroke-width="12" stroke-linecap="round"/>
    <line x1="36" y1="256" x2="76" y2="256" stroke="#a855f7" stroke-width="12" stroke-linecap="round"/>
    <line x1="436" y1="256" x2="476" y2="256" stroke="#ff6a00" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
